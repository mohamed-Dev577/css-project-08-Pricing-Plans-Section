<!DOCTYPE html>
<html lang="ar">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Project 08 - Pricing Plans Section</title> 
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <section class="pricing">
            <div class="plan">
                <h2>الخطة المجانية</h2>
                <p class="price">0$</p>
                <ul>
                    <li>صفحة واحدة</li>
                    <li>تصميم بسيط</li>
                    <li>بدون دعم فني</li>
                </ul>
                <button>ابدا الان</button>
                </div>
        

        <div class="plan featured">
            <span class="badge">الاكثر طلبا</span>
            <h2>الخطة الاحترافية</h2>
            <p class="price">25$</p>
            <ul>
                <li>5 صفحات</li>
                <li>تصميم احترافي</li>
                <li>دعم فني</li>
                <button>ابدا الان</button>
        </div>

        <div class="plan">
            <h2>الخطة المتقدمة</h2>
            <p class="price">50$</p>
            <ul>
                <li>عدد صفحات غير محدود</li>
                <li>تصميم مخصصص</li>
                <li>دعم فني كامل</li>
            </ul>
            <button>ابدا الان</button>
            </div>
        </section>
    </body>
    </html>
